<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Lineage Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <header>
                <h1>Lineage Graph</h1>
                <p>Interactive file & table interactions</p>
            </header>
            
            <section class="filters">
                <div class="filter-group">
                    <label for="app-filter">Application</label>
                    <select id="app-filter">
                        <option value="all">All Applications</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="type-filter">Operation Type</label>
                    <select id="type-filter">
                        <option value="all">All Types</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="search-node">Search Node</label>
                    <input type="text" id="search-node" placeholder="File or table name...">
                </div>
            </section>

            <section id="details">
                <h3>Details</h3>
                <div id="details-content">
                    <p class="placeholder">Select a node to see details</p>
                </div>
            </section>
        </aside>

        <main id="graph-container">
            <svg id="lineage-graph"></svg>
            <div id="controls">
                <button id="reset-zoom">Reset Zoom</button>
                <div class="legend">
                    <div class="legend-item"><span class="dot source"></span> Source / Input</div>
                    <div class="legend-item"><span class="dot target"></span> Target / Output</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
